<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        @font-face {
            font-family: 'Pacifico';
            src: url('https://fonts.gstatic.com/s/pacifico/v22/FwZY7-Qmy14u9lezJ-6H6Mk.woff2') format('woff2');
        }

        body {
            font-family: 'Pacifico', Arial, sans-serif;
        }

        #input::before {
            content: "Before content";
            display: block;
            color: darkred;
            margin-bottom: 10px;
        }

        #input::after {
            content: "After content";
            display: block;
            color: darkblue;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <svg display="none">
        <symbol id="icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"></path>
        </symbol>
    </svg>
    <div id="input" style="color: red;">
        <div style="background-color: yellow; padding: 20px; border: 2px solid black;">
            <p style="font-family: Arial, sans-serif; font-size: 16px; color: blue;">
                Welcome to the <span style="font-weight: bold; text-decoration: underline;">complex</span> example!
            </p>
            <ul style="list-style-type: none;">
                <li style="margin-bottom: 10px; color: green;">Item 1</li>
                <li style="margin-bottom: 10px; color: orange;">Item 2</li>
                <li style="margin-bottom: 10px; color: purple;">Item 3</li>
            </ul>

            <img src="placeholder.png" alt="Image">

            <br>
            <svg width="100" height="100" style="margin-top: 10px;">
                <use href="#icon"></use>
            </svg>

            <br>
            <input type="text" value="Enter text here" style="margin-top: 10px;">
            <br>
            <input type="checkbox" id="checkbox" style="margin-top: 10px;" checked>
            <label for="checkbox">Check me</label>
            <br>
            <select style="margin-top: 10px;">
                <option value="option1">Option 1</option>
                <option value="option2" selected>Option 2</option>
                <option value="option3">Option 3</option>
            </select>
            <br>

            <button style="background-color: lightblue; border: none; padding: 10px; cursor: pointer;">
                Click Me
            </button>
        </div>
    </div>
    <div id="output"></div>
</body>
</html>
